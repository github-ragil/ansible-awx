---
- name: "Failover: Pindahkan 100% Trafik ke Site A"
  hosts: all
  become: yes

  # WAJIB ADA INI
  collections:
    - community.general

  tasks:
    - name: "Set Site A ke 100% (Full Capacity)"
      haproxy:  # Setelah pakai collections di atas, panggil 'haproxy' saja cukup
        socket: /run/haproxy/admin.sock
        backend: site_distribution
        host: Site-A-Jagakarsa
        weight: 100
        state: enabled

    - name: "Set Site B ke 0% (Drain Traffic)"
      haproxy:
        socket: /run/haproxy/admin.sock
        backend: site_distribution
        host: Site-B-Jogja
        weight: 0
        state: enabled
